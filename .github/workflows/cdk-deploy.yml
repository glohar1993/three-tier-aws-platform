name: CDK Deploy — Three Tier Platform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: 'Deploy or Destroy'
        required: true
        default: 'deploy'
        type: choice
        options: [deploy, destroy]

env:
  AWS_REGION: us-east-1
  NODE_VERSION: '22'

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Validate (runs on every PR and push)
  # ─────────────────────────────────────────────
  validate:
    name: Validate CDK Synth
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript compile check
        run: npm run build

      - name: CDK Synth (validate CloudFormation output)
        run: npx cdk synth --all
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ env.AWS_REGION }}

      - name: Upload synth output as artifact
        uses: actions/upload-artifact@v4
        with:
          name: cdk-out
          path: cdk.out/
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 2: Security Scan
  # ─────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Scan for secrets in code
        run: |
          # Simple grep for common secret patterns
          if grep -rE "(AKIA[0-9A-Z]{16}|password\s*=\s*['\"][^'\"]{8,})" \
            --include="*.ts" --include="*.js" \
            --exclude-dir=node_modules --exclude-dir=cdk.out .; then
            echo "❌ Potential secrets found in code!"
            exit 1
          else
            echo "✅ No hardcoded secrets detected"
          fi

  # ─────────────────────────────────────────────
  # JOB 3: Deploy (only on push to main)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: [validate, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: npm ci

      - name: CDK Diff (show what will change)
        run: npx cdk diff --all
        continue-on-error: true
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ env.AWS_REGION }}

      - name: CDK Deploy — NetworkStack
        run: npx cdk deploy NetworkStack --require-approval never
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ env.AWS_REGION }}

      - name: CDK Deploy — PresentationStack
        run: npx cdk deploy PresentationStack --require-approval never
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ env.AWS_REGION }}

      - name: CDK Deploy — ApplicationStack + DataStack (parallel)
        run: npx cdk deploy ApplicationStack DataStack --require-approval never --concurrency 2
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ env.AWS_REGION }}

      - name: Get stack outputs
        id: outputs
        run: |
          ALB_URL=$(aws cloudformation describe-stacks \
            --stack-name PresentationStack \
            --query "Stacks[0].Outputs[?OutputKey=='AppUrl'].OutputValue" \
            --output text)
          echo "alb_url=$ALB_URL" >> $GITHUB_OUTPUT
          echo "✅ App deployed at: $ALB_URL"

      - name: Smoke test — hit /health endpoint
        run: |
          echo "Testing: ${{ steps.outputs.outputs.alb_url }}/health"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "${{ steps.outputs.outputs.alb_url }}/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed (attempt $i)"
              break
            fi
            echo "⏳ Attempt $i failed ($STATUS) — waiting 30s..."
            sleep 30
          done
          [ "$STATUS" = "200" ] || (echo "❌ Health check failed after 5 attempts" && exit 1)

      - name: Post deployment summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Stack | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| NetworkStack | ✅ Deployed |" >> $GITHUB_STEP_SUMMARY
          echo "| PresentationStack | ✅ Deployed |" >> $GITHUB_STEP_SUMMARY
          echo "| ApplicationStack | ✅ Deployed |" >> $GITHUB_STEP_SUMMARY
          echo "| DataStack | ✅ Deployed |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**App URL:** ${{ steps.outputs.outputs.alb_url }}" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────
  # JOB 4: Destroy (manual trigger only)
  # ─────────────────────────────────────────────
  destroy:
    name: Destroy AWS Infrastructure
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: npm ci

      - name: CDK Destroy All Stacks
        run: npx cdk destroy --all --force
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ env.AWS_REGION }}
